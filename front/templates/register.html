{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
    <h2>Регистрация</h2>
    {% if error %}
        <p class="alert">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="input-group"><input type="text" name="name" placeholder="Имя" required></div>
        <div class="input-group"><input type="email" name="email" placeholder="Email" required></div>
        <div class="input-group"><input type="password" name="password" placeholder="Пароль" required></div>
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="{% url 'shop:login' %}">Войти</a></p>
{% endblock %}
