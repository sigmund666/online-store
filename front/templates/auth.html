{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
    <h2>Вход</h2>
    {% if error %}
        <p class="alert">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="input-group"><input type="email" name="email" placeholder="Email" required></div>
        <div class="input-group"><input type="password" name="password" placeholder="Пароль" required></div>
        <button type="submit" class="btn">Войти</button>
    </form>
    <p>Нет аккаунта? <a href="{% url 'shop:register' %}">Зарегистрироваться</a></p>
{% endblock %}
