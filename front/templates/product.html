{% extends "base.html" %}
{% load static %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}
    <h2>{{ product.name }}</h2>
    {% if product.image_url %}
        <img src="{{ product.image_url }}" alt="{{ product.name }}" style="max-width:420px; width:100%; height:auto;">
    {% else %}
        <img src="{% static 'no_image.svg' %}" alt="Нет изображения" style="max-width:420px; width:100%; height:auto;">
    {% endif %}
    <p>{{ product.description }}</p>
    <p><strong>{{ product.price }} BYN</strong></p>
    <form action="{% url 'shop:cart_add' product.id %}" method="post">
        {% csrf_token %}
        <label>Количество:<input type="number" name="quantity" value="1" min="1"></label>
        <button type="submit" class="btn">В корзину</button>
    </form>
{% endblock %}
